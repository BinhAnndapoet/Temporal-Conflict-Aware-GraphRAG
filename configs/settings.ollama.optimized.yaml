### Optimized settings for Ollama local baseline with RTX 5070 Ti (16GB VRAM)
### Key changes from default:
### - concurrent_requests: 2 (was 1) — leverage OLLAMA_NUM_PARALLEL=2
### - embed_text.batch_size: 16 (was 1) — nomic-embed-text is only 274MB
### - embed_text.batch_max_tokens: 8192 (was 1024) — fit more text per batch

concurrent_requests: 2

completion_models:
  default_completion_model:
    model_provider: ollama
    model: ${OLLAMA_CHAT_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${OLLAMA_BASE_URL}
    call_args:
      temperature: 0
      top_p: 0.9
      timeout: 900
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: ollama
    model: ${OLLAMA_EMBED_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${OLLAMA_BASE_URL}
    retry:
      type: exponential_backoff

input:
  type: text

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb
  vector_size: ${OLLAMA_EMBED_DIM}
  index_schema:
    text_unit_text:
      index_name: text_unit_text
      vector_size: ${OLLAMA_EMBED_DIM}
    entity_description:
      index_name: entity_description
      vector_size: ${OLLAMA_EMBED_DIM}
    community_full_content:
      index_name: community_full_content
      vector_size: ${OLLAMA_EMBED_DIM}

embed_text:
  embedding_model_id: default_embedding_model
  batch_size: 16
  batch_max_tokens: 8192
  names: [entity_description, community_full_content, text_unit_text]

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization,person,geo,event]
  max_gleanings: 0

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
